# PPO Trading Model - 全局配置文件

# ==================== 交易參數設定 ====================
trading:
  symbol: "BTCUSDT"              # 交易標的
  market_type: "futures"          # 市場類型：futures (永續合約)
  timeframe: "1m"                 # 時間框架：1分K

  # 槓桿與倉位
  leverage: 1                     # 槓桿倍數
  position_size_pct: 1.0          # 每次開倉使用資金比例（100%）
  max_positions: 1                # 最多同時持倉數

  # 風險管理
  stop_loss_pct: 0.015            # 止損百分比（1.5%）
  daily_drawdown_limit: 0.10      # 單日回撤限制（10%）

  # 交易成本
  taker_fee: 0.000               # Taker 手續費（0.04%）訓練過程暫時關閉
  maker_fee: 0.000               # Maker 手續費（0.02%）
  slippage: 0.0                   # 滑點（暫不模擬）

# ==================== 數據設定 ===================
data:
  # 數據路徑
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"

  # 數據參數
  train_months: 5                 # 訓練數據月數
  test_months: 1                  # 測試數據月數

  # Binance API（如需下載數據）
  binance_api_key: ""             # 留空或填入 API Key
  binance_secret_key: ""          # 留空或填入 Secret Key

# ==================== PPO 超參數 ====================
ppo:
  # 設備設定
  device: "cpu"                  # 訓練設備：cpu 或 cuda（GPU）

  # 學習參數
  learning_rate: 0.00015          # 學習率（v5: 0.0002 → 0.00015 穩定學習）
  n_steps: 2048                   # 更新頻率（每 2048 steps 更新一次）- GPU 4096 CPU 2048
  batch_size: 64                 # 批次大小（GPU 優化）

  n_epochs: 10                     # 每次更新訓練的輪數（v5: 10 → 5 減少過擬合）

  # 折扣與優勢估計
  gamma: 0.95                     # 折扣因子
  gae_lambda: 0.95                # GAE Lambda 參數

  # PPO 特定參數
  clip_range: 0.2                 # PPO Clip 範圍（v5: 0.23 → 0.2 標準值）
  clip_range_vf: null             # Value Function Clip（null = 不裁剪）
  ent_coef: 0.3                   # 熵係數（v5: 0.2 → 0.3 增加探索）
  vf_coef: 2.0                    # Value Function 係數（v5: 0.5 → 1.0 加強 value network）
  max_grad_norm: 0.5              # 梯度裁剪

  # 神經網絡架構
  policy_network:
    - 256                         # 第一層神經元數
    - 256                         # 第二層神經元數
  value_network:
    - 256
    - 256

# ==================== 訓練設定 ====================
training:
  # Episode 設定
  episode_length: 480            # Episode 長度（1440 steps = 24 小時）
  total_timesteps: 130000        # 總訓練步數

  # 日誌與保存
  log_interval: 10                # 每 N 個 episode 記錄一次
  save_freq: 10000                # 每 N 步保存一次模型
  eval_freq: 5000                 # 每 N 步評估一次

  # 效能優化選項
  enable_detailed_logging: true  # 是否記錄詳細訓練監控數據（34+ 指標）
                                  # false = 只記錄基本指標（episode, reward, profit）
                                  # true = 記錄所有指標（動作分布、損失函數、風險指標等）
                                  # 建議：效能測試時設為 false，正式訓練設為 true

  # 輸出路徑
  model_save_dir: "models"
  log_dir: "logs"
  tensorboard_log: "tensorboard"

# ==================== 獎勵函數權重 ====================
reward:
  # === 基礎盈利獎勵 ===
  profit_multiplier: 500           # 盈利時的獎勵倍數（大幅提高！）
  loss_multiplier: 100             # 虧損時的懲罰倍數（相對較輕）

  # === 舊版權重（保留兼容性）===
  floating_weight: 3               # 持倉浮盈/浮虧權重
  realized_weight: 3               # 平倉已實現盈虧權重

  # === 開倉激勵（v5 提高，鼓勵開倉）===
  open_position_reward: 15.0       # 開倉立即獎勵（v4:10 → v5:15）
  profitable_open_bonus: 20.0      # 開倉後有浮盈時的額外獎勵（v4:15 → v5:20）

  # === 平倉獎勵（v5 大幅降低，防止過度平倉）===
  close_position_reward: 0.03      # 任何平倉基礎獎勵（v4:15 → v5:3 大幅降低！）

  # === 獲利平倉獎勵（v5 調整）===
  take_profit_reward: 30.0         # 獲利平倉額外獎勵（v4:40 → v5:50）
  take_profit_threshold: 0.003     # 獲利門檻 0.3%（v4:0.2% → v5:0.3%）

  cut_loss_early_reward: 20.0      # 小虧主動平倉獎勵（v4:25 → v5:20）
  cut_loss_threshold_min: -0.015   # 小虧範圍下限 -1.5%
  cut_loss_threshold_max: -0.003   # 小虧範圍上限 -0.3%（v4:-0.5% → v5:-0.3%）

  # === 過度平倉懲罰（v5 新增！防止 close 動作過多）===
  excessive_close_penalty: -15.0    # *** v5 新增：連續平倉懲罰 ***
  excessive_close_window: 3        # 3 步內再次平倉觸發懲罰

  # === 快速換倉懲罰（v5 調整）===
  rapid_switch_penalty: -20.0      # 快速換倉懲罰（v4:-15 → v5:-20）
  rapid_switch_window: 5           # 5 根 K 線（5 分鐘）內換倉觸發

  # === 持有獎勵/懲罰（v5 提高持有獎勵）===
  holding_profit_reward: 5.0       # 持有獲利倉位每步獎勵（v4:2.0 → v5:5.0 大幅提高！）
  holding_loss_penalty: -1.5       # 持有虧損倉位懲罰（v4:-2.0 → v5:-1.5）
  holding_loss_threshold: 0.015    # 虧損門檻 1.5%

  # === 過度 Hold 懲罰（v5 調整）===
  excessive_hold_penalty: -0.5     # 連續 Hold 懲罰（v4:-1.0 → v5:-0.5 降低）
  excessive_hold_window: 30        # 連續 Hold 超過 30 步開始懲罰（v4:20 → v5:30）

  # === 持倉時間限制（v4 調整）===
  max_holding_bars: 120            # 最多持倉 2 小時
  min_holding_bars: 3              # 最少持倉 3 分鐘（v3:5 → v4:3，放寬）
  overtime_holding_penalty: -15.0  # 超時持倉懲罰
  undertime_holding_penalty: -5.0  # 過短持倉懲罰

  # === 交易成本調整 ===
  trading_fee_multiplier: 0.5      # 手續費懲罰倍數（從 0.3 → 0.5，略提高）

  # === 空倉懲罰 ===
  no_position_window: 30           # 連續空倉步數門檻（從 20 → 30）
  no_position_penalty: -2.0        # 連續空倉懲罰（從 -1 → -2）

  # === 夏普比率 ===
  sharpe_weight: 0.3               # 夏普比率改善權重
  sharpe_window: 240               # 夏普滾動窗口（步數）

  # === 風險懲罰 ===
  high_risk_penalty: -15           # 高風險倉位懲罰（超過 50% 倉位）
  stop_loss_penalty: -200          # 止損重懲罰（保持嚴格）
  daily_drawdown_penalty: -400     # 單日回撤超限重懲罰（保持嚴格）

  # === 持倉時間獎勵（v2 舊版，保留兼容性）===
  holding_time_reward: 0.0         # 移除舊機制（改用 holding_profit_reward）
  max_holding_reward_bars: 120     # 保留參數

# ==================== ICT 特徵參數 ====================
features:
  # Market Structure
  structure_lookback: 180          # 市場結構回看期數

  # Order Blocks
  ob_lookback: 180                # Order Block 回看期數
  ob_min_size: 0.002              # Order Block 最小大小（0.2%）

  # Fair Value Gaps
  fvg_min_size: 0.001             # FVG 最小大小（0.1%）
  fvg_max_age: 180                # FVG 最大保留期數

  # Liquidity
  liquidity_lookback: 180          # 流動性回看期數

  # Multi-Timeframe
  higher_timeframes:
    - "5m"                        # 5分K
    - "15m"                       # 15分K

# ==================== 回測設定 ====================
backtest:
  initial_capital: 1000000          # 初始資金（USDT）
  commission: 0.0              # 手續費

  # 報告輸出
  html_report: true               # 生成 HTML 報告
  trades_csv: true                # 生成交易記錄 CSV
  plots: true                     # 生成圖表

# ==================== 其他設定 ====================
misc:
  random_seed: 42                 # 隨機種子（可重現性）
  verbose: 1                      # 詳細程度（0=安靜, 1=正常, 2=詳細）
  n_cpu: 6                        # 使用的 CPU 核心數（並行環境）
