# PPO Trading Model - 全局配置文件

# ==================== 交易參數設定 ====================
trading:
  symbol: "BTCUSDT"              # 交易標的
  market_type: "futures"          # 市場類型：futures (永續合約)
  timeframe: "1m"                 # 時間框架：1分K

  # 槓桿與倉位
  leverage: 10                    # 槓桿倍數
  position_size_pct: 0.15         # 每次開倉使用資金比例（15%）
  max_positions: 1                # 最多同時持倉數

  # 風險管理
  stop_loss_pct: 0.015            # 止損百分比（1.5%）
  daily_drawdown_limit: 0.10      # 單日回撤限制（10%）

  # 交易成本
  taker_fee: 0.0004               # Taker 手續費（0.04%）
  maker_fee: 0.0002               # Maker 手續費（0.02%）
  slippage: 0.0                   # 滑點（暫不模擬）

# ==================== 數據設定 ====================
data:
  # 數據路徑
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"

  # 數據參數
  train_months: 5                 # 訓練數據月數
  test_months: 1                  # 測試數據月數

  # Binance API（如需下載數據）
  binance_api_key: ""             # 留空或填入 API Key
  binance_secret_key: ""          # 留空或填入 Secret Key

# ==================== PPO 超參數 ====================
ppo:
  # 學習參數
  learning_rate: 0.0003           # 學習率（3e-4）
  n_steps: 2048                   # 更新頻率（每 2048 steps 更新一次）
  batch_size: 64                  # 批次大小
  n_epochs: 10                    # 每次更新訓練的輪數

  # 折扣與優勢估計
  gamma: 0.99                     # 折扣因子
  gae_lambda: 0.95                # GAE Lambda 參數

  # PPO 特定參數
  clip_range: 0.2                 # PPO Clip 範圍
  clip_range_vf: null             # Value Function Clip（null = 不裁剪）
  ent_coef: 0.01                  # 熵係數（探索程度）
  vf_coef: 0.5                    # Value Function 係數
  max_grad_norm: 0.5              # 梯度裁剪

  # 神經網絡架構
  policy_network:
    - 256                         # 第一層神經元數
    - 256                         # 第二層神經元數
  value_network:
    - 256
    - 256

# ==================== 訓練設定 ====================
training:
  # Episode 設定
  episode_length: 1440            # Episode 長度（1440 steps = 24 小時）
  total_timesteps: 1000000        # 總訓練步數

  # 日誌與保存
  log_interval: 10                # 每 N 個 episode 記錄一次
  save_freq: 10000                # 每 N 步保存一次模型
  eval_freq: 5000                 # 每 N 步評估一次

  # 輸出路徑
  model_save_dir: "models"
  log_dir: "logs"
  tensorboard_log: "tensorboard"

# ==================== 獎勵函數權重 ====================
reward:
  # 獎勵組成
  pnl_weight: 100                 # PnL 獎勵權重
  sharpe_weight: 10               # 夏普比率改善權重

  # 懲罰
  high_risk_penalty: -20          # 高風險倉位懲罰（超過 50% 倉位）
  stop_loss_penalty: -50          # 止損懲罰
  daily_drawdown_penalty: -100    # 單日回撤超限懲罰

  # 持倉時間獎勵
  holding_time_reward: 0.1        # 持有獲利倉位的獎勵（每 K 線）
  max_holding_reward_bars: 10     # 最多獎勵的 K 線數

# ==================== ICT 特徵參數 ====================
features:
  # Market Structure
  structure_lookback: 50          # 市場結構回看期數

  # Order Blocks
  ob_lookback: 20                 # Order Block 回看期數
  ob_min_size: 0.002              # Order Block 最小大小（0.2%）

  # Fair Value Gaps
  fvg_min_size: 0.001             # FVG 最小大小（0.1%）
  fvg_max_age: 100                # FVG 最大保留期數

  # Liquidity
  liquidity_lookback: 50          # 流動性回看期數

  # Multi-Timeframe
  higher_timeframes:
    - "5m"                        # 5分K
    - "15m"                       # 15分K

# ==================== 回測設定 ====================
backtest:
  initial_capital: 10000          # 初始資金（USDT）
  commission: 0.0004              # 手續費

  # 報告輸出
  html_report: true               # 生成 HTML 報告
  trades_csv: true                # 生成交易記錄 CSV
  plots: true                     # 生成圖表

# ==================== 其他設定 ====================
misc:
  random_seed: 42                 # 隨機種子（可重現性）
  verbose: 1                      # 詳細程度（0=安靜, 1=正常, 2=詳細）
  n_cpu: 4                        # 使用的 CPU 核心數（並行環境）
