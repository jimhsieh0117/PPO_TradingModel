# ==============================================================================
# PPO Trading Model - 全局配置文件（共用版）
# ==============================================================================
#
# 📌 使用方式：
#   此檔案為所有開發者共用的基礎配置，透過 git 追蹤。
#   請勿直接在此修改平台相關或實驗性參數。
#
# 🔧 自訂參數：
#   1. 建立 config_local.yaml（不被 git 追蹤）
#   2. 只需寫入你想覆蓋的參數，例如：
#        ppo:
#          device: "mps"
#        misc:
#          n_cpu: 8
#   3. 程式啟動時會自動合併 config_local.yaml 覆蓋此檔的值
#
# 🔄 同步流程（將好參數同步回共用配置）：
#   1. 在 config_local.yaml 中調好參數並驗證效果
#   2. 執行 python sync_config.py 將變更合併回此檔
#   3. git commit + push 讓其他開發者取得最新參數
#
# ⚡ 快速開始：
#   python setup_env.py    # 自動安裝環境 + 生成 config_local.yaml
#   python train.py        # 開始訓練
#
# ==============================================================================

# ==================== 交易參數設定 ====================
trading:
  symbol: "BTCUSDT"              # 交易標的
  market_type: "futures"          # 市場類型：futures (永續合約)
  timeframe: "1m"                 # 時間框架：1分K

  # 槓桿與倉位
  leverage: 1                     # 槓桿倍數
  position_size_pct: 0.99         # 每次開倉使用資金比例（100%）
  max_positions: 1                # 最多同時持倉數

  # 風險管理
  stop_loss_pct: 0.015            # 止損百分比（1.5%，ATR 不可用時的 fallback）
  atr_stop_multiplier: 2.0        # ATR 止損倍數（2x ATR，動態適應波動率）
  trailing_stop: false             # 啟用追蹤止損（止損價只朝有利方向移動）
  daily_drawdown_limit: 0.10      # 單日回撤限制（10%）

  # 交易成本
  taker_fee: 0.0004              # Taker 手續費（0.04%）- 啟用以訓練適應真實成本
  maker_fee: 0.000               # Maker 手續費（0.02%）
  slippage: 0.0005                 # 滑點（0.05%，每次成交價格偏移）

# ==================== 數據設定 ===================
data:
  # 數據路徑
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"

  # 數據日期範圍（train.py 啟動時自動檢查，無數據則自動下載）
  symbol: "BTCUSDT"               # 交易對
  start_date: "2020-01-01 00:00:00"      # 全部數據的起始時間
  end_date: "2026-02-14 23:59:59"        # 全部數據的結束時間
  test_start_date: "2025-01-01 00:00:00" # 測試集起始時間（此時間之前為訓練集）

# ==================== PPO 超參數 ====================
ppo:
  # 設備設定
  device: "auto"                   # 訓練設備：auto（自動偵測 cuda/mps/cpu）、或手動指定

  # 學習參數
  learning_rate: 0.0001          # 學習率（v5: 0.0002 → 0.00015 穩定學習）
  n_steps: 2048                   # 更新頻率（每 2048 steps 更新一次）
  batch_size: 64                  # WFA 關鍵：batch_size=64 → 32 minibatch/update（比256多4x梯度更新）

  n_epochs: 8                      # 每次更新訓練的輪數（v8.1: 6 → 8 折中值）

  # 折扣與優勢估計
  gamma: 0.95                     # 折扣因子（v8.1: 0.97 → 0.95 回退，減少 value target 方差）
  gae_lambda: 0.95                # GAE Lambda 參數

  # PPO 特定參數
  clip_range: 0.2                 # PPO Clip 範圍（v5: 0.23 → 0.2 標準值）
  clip_range_vf: 0.2             # Value Function Clip（null = 不裁剪）
  ent_coef: 0.1                     # 熵係數（WFA 關鍵：0.07 導致模型收斂到不交易，必須 >= 0.1）
  vf_coef: 0.5                    # Value Function 係數（v9: 2.0 → 0.5 恢復默認，避免 value loss 主導梯度）
  max_grad_norm: 0.5              # 梯度裁剪

  # 神經網絡架構
  policy_network:
    - 256                         # 第一層神經元數
    - 128                         # 第二層神經元數
  value_network:
    - 256
    - 128

# ==================== LSTM 配置 ====================
lstm:
  enabled: false                     # true = RecurrentPPO, false = 普通 PPO
  lstm_hidden_size: 128            # LSTM 隱藏層大小
  n_lstm_layers: 1                 # LSTM 層數

# ==================== 訓練設定 ====================
training:
  # Episode 設定
  episode_length: 480            # Episode 長度（1440 steps = 24 小時）
  total_timesteps: 1000000        # 總訓練步數

  # 日誌與保存
  log_interval: 10                # 每 N 個 episode 記錄一次
  save_freq: 10000                # 每 N 步保存一次模型
  eval_freq: 5000                 # 每 N 步評估一次

  # 效能優化選項
  enable_detailed_logging: true  # 是否記錄詳細訓練監控數據（34+ 指標）
                                  # false = 只記錄基本指標（episode, reward, profit）
                                  # true = 記錄所有指標（動作分布、損失函數、風險指標等）
                                  # 建議：效能測試時設為 false，正式訓練設為 true

  # 輸出路徑
  model_save_dir: "models"
  log_dir: "logs"
  tensorboard_log: "tensorboard"

# ==================== 獎勵函數設定 (v9.0) ====================
# v9.0 設計：以已實現 PnL 為主導，大幅降低浮動獎勵權重
#
# 獎勵公式：
#   if profit: reward = (realized_pnl / balance) * pnl_reward_scale * take_profit_multiplier  # 止盈 1.7x
#   if loss:   reward = (realized_pnl / balance) * pnl_reward_scale * 1.0                     # 止損 1.0x
#   reward += (floating_pnl_pct) * floating_reward_scale              # 每步（持倉時）
#   if stop_loss: reward -= stop_loss_extra_penalty
#
reward:
  pnl_reward_scale: 700           # 已實現盈虧縮放（滑點加入後成本 2.25x，500→1000 強化獲利信號）
  take_profit_multiplier: 1.3     # 止盈獎勵倍數（盈利平倉 reward × 1.7，虧損平倉 × 1.0）
  floating_reward_scale: 30        # 浮動盈虧縮放（v9: 120 → 30 讓已實現 PnL 主導 reward）
  stop_loss_extra_penalty: 3.5     # 止損額外懲罰
  holding_bonus_max: 1.5           # 盈利交易持倉品質獎勵（持倉30步達最大值）
  holding_bonus_steps: 30          # 達到最大獎勵的持倉步數
  rapid_reentry_penalty: 0.0       # v9: 移除，手續費本身即為天然懲罰
  rapid_reentry_threshold: 3       # 重新開倉閾值（步）
  episode_profit_bonus: 100        # Episode 結算獎勵縮放（+5% episode → +5.0 bonus）
  # === 空倉機會成本 ===
  idle_penalty_enabled: false         # 啟用空倉機會成本
  idle_penalty_atr_threshold: 10    # 觸發門檻：bar 變動 > 0.5x ATR
  idle_penalty_scale: 0.3            # 懲罰縮放（小值，避免過度交易）
  idle_penalty_cooldown: 5           # 平倉後 N 步內不觸發
  # === 低波動持倉獎勵 ===
  low_vol_hold_bonus: 0.0          # 低波動空倉每步獎勵（鼓勵在低波動期耐心等待）
  low_vol_threshold: 0.3             # volatility_regime < 此值時觸發（ATR 在近 480 根的 30 百分位以下）
  # === Regime-Conditional Reward (方案 A) ===
  regime_reward_enabled: false          # 啟用 Regime 感知獎勵
  regime_low_vol_threshold: 0.3        # volatility_regime < 此值視為低波動
  regime_low_adx_threshold: 0.2        # adx_normalized < 此值視為無趨勢
  regime_pnl_bonus: 1.5                # 低波動期盈利交易 reward 倍數（×1.5）
  # === Dynamic Stop Loss + Max Holding (方案 B) ===
  dynamic_atr_stop: false                # 啟用 volatility-adaptive ATR 止損倍數
  atr_stop_high_vol: 1.0               # 高波動期 ATR 倍數（更緊止損）
  atr_stop_low_vol: 2.0                # 低波動期 ATR 倍數（更寬止損）
  max_holding_steps: 9999               # 最大持倉時間（360 bars = 6 小時）

# ==================== ICT 特徵參數 ====================
features:
  # Market Structure
  structure_lookback: 180          # 市場結構回看期數

  # Order Blocks
  ob_lookback: 180                # Order Block 回看期數
  ob_min_size: 0.002              # Order Block 最小大小（0.2%）

  # Fair Value Gaps
  fvg_min_size: 0.001             # FVG 最小大小（0.1%）
  fvg_max_age: 180                # FVG 最大保留期數

  # Liquidity
  liquidity_lookback: 180          # 流動性回看期數

  # Multi-Timeframe
  higher_timeframes:
    - "5m"                        # 5分K
    - "15m"                       # 15分K

# ==================== 回測設定 ====================
backtest:
  initial_capital: 1000000          # 初始資金（USDT）
  commission: 0.0004           # 手續費 (0.04% taker fee)

  # 報告輸出
  html_report: true               # 生成 HTML 報告
  trades_csv: true                # 生成交易記錄 CSV
  plots: true                     # 生成圖表

# ==================== Walk Forward Analysis ====================
wfa:
  train_window_months: 6           # 訓練窗口（月）
  test_window_months: 1             # 測試窗口（月）
  step_months: 1                    # 每次滾動步長（月）
  total_timesteps: 2000000           # 每個 fold 訓練步數
  max_parallel_folds: 6             # 同時並行的 fold 數
  n_cpu_per_fold: 1                 # 每個 fold 的環境數（DummyVecEnv）

  # 通過標準
  pass_criteria:
    min_profitable_folds_ratio: 0.67  # 至少 67% fold 盈利
    min_avg_sharpe: 1.3               # 平均 Sharpe > 1.3
    max_fold_drawdown_pct: -10.0      # 單 fold 最大回撤不超過 -10%

# ==================== 其他設定 ====================
misc:
  random_seed: 42                 # 隨機種子（可重現性）
  verbose: 1                      # 詳細程度（0=安靜, 1=正常, 2=詳細）
  n_cpu: 6                        # 使用的 CPU 核心數（並行環境）
